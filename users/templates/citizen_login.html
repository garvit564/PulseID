<!DOCTYPE html>
<html>
<head>
    <title>Citizen Login</title>
    <style>
        body { font-family: Arial; background:#f5f7fa; display:flex; justify-content:center; align-items:center; height:100vh; }
        .box { background:white; padding:30px; width:350px; box-shadow:0 0 15px rgba(0,0,0,0.1); border-radius:8px; }
        h2 { text-align:center; }
        input { width:100%; padding:8px; margin:8px 0; }
        button { width:100%; padding:10px; background:#198754; color:white; border:none; }
        button:hover { background:#146c43; }
        .error { color:red; text-align:center; }
    </style>
</head>
<body>
<div class="box">
    <h2>Citizen Login</h2>

    {% if error %}
    <p class="error">{{ error }}</p>
    {% endif %}

    <form method="POST">
        {% csrf_token %}
        <input type="email" name="email" placeholder="Email" required>
        <input type="password" name="password" placeholder="Password" required>
        <button type="submit">Login</button>
    </form>
</div>
</body>
</html>
