{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dr. {{ doctor.user.name }}</title>

    <link rel="stylesheet" href="{% static 'css/doctor_public_profile.css' %}">
</head>
<body>

<div class="layout">

    <!-- LEFT SIDE (Profile Highlight) -->
    <div class="left">
        <div class="profile">
            <div class="avatar">👨‍⚕️</div>
            <h2>Dr. {{ doctor.user.name }}</h2>
            <p class="verify">✔ Govt Verified</p>
        </div>
    </div>

    <!-- RIGHT SIDE (Details) -->
    <div class="right">

        <h3>Doctor Information</h3>

        <div class="row">
            <span>Specialization</span>
            <p>{{ doctor.specialization }}</p>
        </div>

        <div class="row">
            <span>Hospital</span>
            <p>{{ doctor.hospital.hospital_name }}</p>
        </div>

        <div class="row">
            <span>License Number</span>
            <p>{{ doctor.license_number }}</p>
        </div>

        <div class="actions">
            <a href="/" class="btn light">← Back</a>
            <a href="#" class="btn primary">Consult Now</a>
        </div>

    </div>

</div>

</body>
</html>
