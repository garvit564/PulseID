{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register - PulseID</title>

    <link rel="stylesheet" href="{% static 'css/citizen_register.css' %}">
</head>
<body>

<div class="container">
    <div class="card">

        <h2>PulseID</h2>
        <p class="subtitle">Create your account</p>

        {% if error %}
        <p class="error">{{ error }}</p>
        {% endif %}

        <form method="POST">
            {% csrf_token %}

            <div class="input-box">
                <input type="text" name="name" required>
                <label>Full Name</label>
            </div>

            <div class="input-box">
                <input type="email" name="email" required>
                <label>Email Address</label>
            </div>

            <div class="input-box">
                <input type="password" name="password" required>
                <label>Password</label>
            </div>

            <button type="submit">Create Account</button>
        </form>

        <p class="bottom-text">
            Already have an account? <a href="/citizen/login/">Login</a>
        </p>

    </div>
</div>

</body>
</html>
