<!DOCTYPE html>
<html>
<head>
    <title>Verify OTP - PulseID</title>
    <style>
        body {
            font-family: Arial;
            background: #f4f6f9;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        .card {
            background: white;
            padding: 35px;
            width: 350px;
            border-radius: 12px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.15);
            text-align: center;
        }

        h2 {
            margin-bottom: 20px;
        }

        input {
            width: 100%;
            padding: 10px;
            margin: 10px 0;
            border-radius: 6px;
            border: 1px solid #ccc;
        }

        button {
            width: 100%;
            padding: 10px;
            background: #198754;
            color: white;
            border: none;
            border-radius: 6px;
            cursor: pointer;
        }

        button:hover {
            background: #157347;
        }

        .error {
            color: red;
            margin-bottom: 10px;
        }

        .info {
            color: gray;
            font-size: 14px;
        }
    </style>
</head>
<body>

<div class="card">
    <h2>Enter OTP</h2>

    <p class="info">OTP has been sent to the registered email.</p>

    {% if error %}
        <p class="error">{{ error }}</p>
    {% endif %}

    <form method="POST" action="{% url 'verify_qr_otp' %}">
        {% csrf_token %}
        <input type="text" name="otp" placeholder="Enter 6-digit OTP" required>
        <button type="submit">Verify OTP</button>
    </form>

    <br>
    <a href="/">Back to Home</a>
</div>

</body>
</html>
