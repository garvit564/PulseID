{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Verify OTP - PulseID</title>

    <link rel="stylesheet" href="{% static 'css/qr_verify.css' %}">
</head>
<body>

<div class="wrapper">

    <div class="otp-box">

        <h2>🔐 Verify OTP</h2>
        <p>OTP: {{ debug_otp }}</p>
        <p class="subtitle">Enter the 6-digit code sent to your email</p>

        {% if error %}
            <p class="error">{{ error }}</p>
        {% endif %}

        <form method="POST" action="{% url 'verify_qr_otp' %}">
            {% csrf_token %}

            <div class="otp-inputs">
                <input type="text" maxlength="1" required>
                <input type="text" maxlength="1" required>
                <input type="text" maxlength="1" required>
                <input type="text" maxlength="1" required>
                <input type="text" maxlength="1" required>
                <input type="text" maxlength="1" required>
            </div>

            <!-- hidden actual value -->
            <input type="hidden" name="otp" id="otp_value">

            <button type="submit">Verify</button>
        </form>

        <a href="/" class="back">← Back to Home</a>

    </div>

</div>

<script>
    const inputs = document.querySelectorAll(".otp-inputs input");
    const hiddenInput = document.getElementById("otp_value");

    inputs.forEach((input, index) => {
        input.addEventListener("input", () => {
            if (input.value.length === 1 && index < inputs.length - 1) {
                inputs[index + 1].focus();
            }

            updateOTP();
        });

        input.addEventListener("keydown", (e) => {
            if (e.key === "Backspace" && !input.value && index > 0) {
                inputs[index - 1].focus();
            }
        });
    });

    function updateOTP() {
        let otp = "";
        inputs.forEach(input => otp += input.value);
        hiddenInput.value = otp;
    }
</script>

</body>
</html>
