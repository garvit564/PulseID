<!DOCTYPE html>
<html>
<head>
    <title>Government Login</title>
    <style>
        body { font-family: Arial; background:#eef2f7; display:flex; justify-content:center; align-items:center; height:100vh; }
        .box { background:white; padding:30px; width:350px; border-radius:8px; box-shadow:0 0 15px rgba(0,0,0,0.1); }
        input { width:100%; padding:8px; margin:8px 0; }
        button { width:100%; padding:10px; background:#6f42c1; color:white; border:none; }
    </style>
</head>
<body>
<div class="box">
    <h2>Government Login</h2>
    <form method="POST">
        {% csrf_token %}
        <input type="email" name="email" placeholder="Email" required>
        <input type="password" name="password" placeholder="Password" required>
        <button type="submit">Login</button>
    </form>
</div>
</body>
</html>
