{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Emergency Request</title>

<link rel="stylesheet" href="{% static 'css/emergency_form.css' %}">
</head>
<body>

<div class="wrapper">

    <div class="card">

        <h2>🚑 Emergency Request</h2>
        <p class="subtitle">Quickly request ambulance assistance</p>

        {% if error %}
        <p class="error">{{ error }}</p>
        {% endif %}

        <form method="POST">
            {% csrf_token %}

            <div class="input-group">
                <input type="text" name="health_id" required>
                <label>Unique Health ID</label>
            </div>

            <div class="input-group">
                <textarea name="reason" required></textarea>
                <label>Describe Emergency</label>
            </div>

            <div class="input-group">
                <input type="text" id="location_input" name="location" required autocomplete="off">
                <label>Location</label>
            </div>

            <div id="suggestions" class="suggestions"></div>

            <input type="hidden" name="latitude" id="latitude">
            <input type="hidden" name="longitude" id="longitude">

            <button type="submit">🚑 Request Ambulance</button>
        </form>

    </div>

</div>

<script>
const input = document.getElementById("location_input");
const suggestionsBox = document.getElementById("suggestions");

let debounceTimer;

input.addEventListener("input", function () {

    clearTimeout(debounceTimer);

    debounceTimer = setTimeout(() => {

        let query = input.value;

        if (query.length < 3) {
            suggestionsBox.innerHTML = "";
            return;
        }

        fetch(`https://nominatim.openstreetmap.org/search?format=json&addressdetails=1&q=${query}&limit=8&countrycodes=in`)
            .then(res => res.json())
            .then(data => {

                suggestionsBox.innerHTML = "";

                data.forEach(place => {

                    let div = document.createElement("div");
                    div.classList.add("suggestion-item");

                    div.innerText = place.display_name;

                    div.onclick = function () {
                        input.value = place.display_name;
                        document.getElementById("latitude").value = place.lat;
                        document.getElementById("longitude").value = place.lon;
                        suggestionsBox.innerHTML = "";
                    };

                    suggestionsBox.appendChild(div);
                });

            });

    }, 400);

});
</script>

</body>
</html>
