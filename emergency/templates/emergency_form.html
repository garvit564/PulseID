<h2>🚑 Emergency Request</h2>

{% if error %}
<p style="color:red;">{{ error }}</p>
{% endif %}

<form method="POST">
    {% csrf_token %}

    <input type="text" name="health_id" placeholder="Unique Health ID" required><br><br>

    <textarea name="reason" placeholder="Describe emergency..." required></textarea><br><br>

    <input type="text" id="location_input" name="location" placeholder="Enter Location" required>
    <div id="suggestions"></div>

    <input type="hidden" name="latitude" id="latitude">
    <input type="hidden" name="longitude" id="longitude">

    <br>
    <button type="submit" style="background:red;color:white;">
        Request Ambulance
    </button>
</form>

<script>
const input = document.getElementById("location_input");
const suggestionsBox = document.getElementById("suggestions");

let debounceTimer;

input.addEventListener("input", function () {

    clearTimeout(debounceTimer);

    debounceTimer = setTimeout(() => {

        let query = input.value;

        if (query.length < 3) {
            suggestionsBox.innerHTML = "";
            return;
        }

        fetch(`https://nominatim.openstreetmap.org/search?format=json&addressdetails=1&q=${query}&limit=8&countrycodes=in`)
            .then(response => response.json())
            .then(data => {

                suggestionsBox.innerHTML = "";

                data.forEach(place => {

                    let div = document.createElement("div");

                    div.innerText = place.display_name;
                    div.style.cursor = "pointer";
                    div.style.padding = "6px";
                    div.style.borderBottom = "1px solid #ddd";

                    div.onclick = function () {

                        input.value = place.display_name;

                        document.getElementById("latitude").value = place.lat;
                        document.getElementById("longitude").value = place.lon;

                        suggestionsBox.innerHTML = "";

                    };

                    suggestionsBox.appendChild(div);

                });

            });

    }, 400);

});
</script>
