<!DOCTYPE html>
<html>
<head>
    <title>Verify OTP</title>
    <style>
        body { font-family: Arial; background:#f4f6f9; text-align:center; }
        .card {
            background:white;
            width:400px;
            margin:80px auto;
            padding:30px;
            border-radius:10px;
            box-shadow:0 0 15px rgba(0,0,0,0.1);
        }
        input, button {
            padding:8px;
            width:100%;
            margin:8px 0;
        }
        button {
            background:#198754;
            color:white;
            border:none;
            border-radius:5px;
        }
    </style>
</head>
<body>

<div class="card">
    <h2>Verify OTP</h2>

    {% if error %}
        <p style="color:red;">{{ error }}</p>
    {% endif %}

    <form method="POST" action="/doctor/verify-otp/">
        {% csrf_token %}
        <input type="text" name="otp" placeholder="Enter OTP" required>
        <button type="submit">Verify</button>
    </form>

</div>

</body>
</html>
