<!DOCTYPE html>
<html>
  <head>
    <title>Hospital Register</title>
    <style>
      body {
        font-family: Arial;
        background: #eef2f7;
        display: flex;
        justify-content: center;
        align-items: center;
        height: 100vh;
      }
      .card {
        background: white;
        padding: 30px;
        width: 400px;
        border-radius: 8px;
        box-shadow: 0 0 15px rgba(0, 0, 0, 0.1);
      }
      input,
      textarea {
        width: 100%;
        padding: 8px;
        margin: 6px 0;
      }
      button {
        width: 100%;
        padding: 10px;
        background: #0d6efd;
        color: white;
        border: none;
      }
    </style>
  </head>
  <body>
    <div class="card">
      <h2>Hospital Registration</h2>
      <form method="POST">
        {% csrf_token %}
        <input type="text" name="name" placeholder="Admin Name" required />
        <input type="email" name="email" placeholder="Email" required />
        <input type="password" name="password" placeholder="Password" required />
        <input type="text" name="hospital_name" placeholder="Hospital Name" required />
        <label>Hospital Specialities</label>

        <div>
          <input type="checkbox" name="specialities" value="cardiology" />Cardiology<br />

          <input type="checkbox" name="specialities" value="trauma" />Trauma<br />

          <input type="checkbox" name="specialities" value="orthopedic" />Orthopedic<br />

          <input type="checkbox" name="specialities" value="neurology" />Neurology<br />

          <input type="checkbox" name="specialities" value="pediatric" />Pediatric<br />

          <input type="checkbox" name="specialities" value="general" />General Emergency<br />
        </div>
        <label>Location</label>
        <input type="text" id="location_input" name="city" placeholder="Enter city or area" autocomplete="off" required />

        <div id="suggestions" style="border:1px solid #ccc; max-height:150px; overflow-y:auto;"></div>

        <input type="hidden" name="latitude" id="latitude" />
        <input type="hidden" name="longitude" id="longitude" />
        <input type="text" name="license_number" placeholder="License Number" required />
        <button type="submit">Register</button>
      </form>
    </div>

    <script>
      const input = document.getElementById('location_input')
      const suggestionsBox = document.getElementById('suggestions')
      
      input.addEventListener('input', function () {
        let query = this.value
      
        if (query.length < 2) {
          suggestionsBox.innerHTML = ''
          return
        }
      
        fetch(`https://nominatim.openstreetmap.org/search?format=json&q=${query}`)
          .then((response) => response.json())
          .then((data) => {
            suggestionsBox.innerHTML = ''
      
            data.slice(0, 5).forEach((place) => {
              let div = document.createElement('div')
              div.style.padding = '5px'
              div.style.cursor = 'pointer'
              div.innerText = place.display_name
      
              div.onclick = function () {
                input.value = place.display_name
                document.getElementById('latitude').value = place.lat
                document.getElementById('longitude').value = place.lon
      
                suggestionsBox.innerHTML = ''
              }
      
              suggestionsBox.appendChild(div)
            })
          })
      })
    </script>
  </body>
</html>
