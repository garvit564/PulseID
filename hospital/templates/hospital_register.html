{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hospital Register</title>

    <link rel="stylesheet" href="{% static 'css/hospital_register.css' %}">
</head>
<body>

<div class="layout">

    <!-- LEFT SIDE -->
    <div class="left">
        <h1>PulseID</h1>
        <p>Register your hospital and join the digital healthcare network</p>
    </div>

    <!-- RIGHT SIDE -->
    <div class="right">

        <form method="POST" class="form">
            {% csrf_token %}

            <h2>Create Hospital Account</h2>

            <div class="input-group">
                <input type="text" name="name" required>
                <label>Admin Name</label>
            </div>

            <div class="input-group">
                <input type="email" name="email" required>
                <label>Email</label>
            </div>

            <div class="input-group">
                <input type="password" name="password" required>
                <label>Password</label>
            </div>

            <div class="input-group">
                <input type="text" name="hospital_name" required>
                <label>Hospital Name</label>
            </div>

            <p class="label">Specialities</p>

            <div class="chips">
                <label><input type="checkbox" name="specialities" value="cardiology">Cardiology</label>
                <label><input type="checkbox" name="specialities" value="trauma">Trauma</label>
                <label><input type="checkbox" name="specialities" value="orthopedic">Orthopedic</label>
                <label><input type="checkbox" name="specialities" value="neurology">Neurology</label>
                <label><input type="checkbox" name="specialities" value="pediatric">Pediatric</label>
                <label><input type="checkbox" name="specialities" value="general">Emergency</label>
            </div>

            <div class="input-group">
                <input type="text" id="location_input" name="city" required autocomplete="off">
                <label>Location</label>
            </div>

            <div id="suggestions" class="suggestions"></div>

            <input type="hidden" name="latitude" id="latitude">
            <input type="hidden" name="longitude" id="longitude">

            <div class="input-group">
                <input type="text" name="license_number" required>
                <label>License Number</label>
            </div>

            <button type="submit">Register Hospital</button>

        </form>

    </div>

</div>

<script>
const input = document.getElementById('location_input');
const suggestionsBox = document.getElementById('suggestions');

input.addEventListener('input', function () {
    let query = this.value;

    if (query.length < 2) {
        suggestionsBox.innerHTML = '';
        return;
    }

    fetch(`https://nominatim.openstreetmap.org/search?format=json&q=${query}`)
    .then(res => res.json())
    .then(data => {
        suggestionsBox.innerHTML = '';

        data.slice(0,5).forEach(place => {
            let div = document.createElement('div');
            div.classList.add('suggestion-item');
            div.innerText = place.display_name;

            div.onclick = function () {
                input.value = place.display_name;
                document.getElementById('latitude').value = place.lat;
                document.getElementById('longitude').value = place.lon;
                suggestionsBox.innerHTML = '';
            };

            suggestionsBox.appendChild(div);
        });
    });
});
</script>

</body>
</html>
